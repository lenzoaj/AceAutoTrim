kind = "web"
previewPath = "/"
title = "Ace Automotive Trimming"
version = "1.0.0"
id = "artifacts/ace-auto-trim"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23353

[services.development]
run = "pnpm --filter @workspace/ace-auto-trim run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ace-auto-trim", "run", "build" ]
publicDir = "artifacts/ace-auto-trim/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23353"
BASE_PATH = "/"
